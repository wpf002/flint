# Local private registry for Flint (spec §9: "self-hosted Verdaccio").
# Run with: pnpm registry:start  (serves on http://localhost:4873)
#
# The @flint/* scope is served locally with anonymous publish ($all) so the
# package can be published and installed without auth juggling on a dev box.
# Everything else proxies to npmjs, so a consuming app can point entirely at
# this registry if it wants, or just scope @flint to it.

storage: ./storage

uplinks:
  npmjs:
    url: https://registry.npmjs.org/
    cache: true

packages:
  '@flint/*':
    access: $all
    publish: $all
    unpublish: $all

  '@*/*':
    access: $all
    publish: $authenticated
    proxy: npmjs

  '**':
    access: $all
    publish: $authenticated
    proxy: npmjs

# Keep the default self-signed token behavior; anonymous publish is gated to
# the @flint/* scope above, not the whole registry.
log:
  type: stdout
  format: pretty
  level: warn
